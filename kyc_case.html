 /* App aliases mapped onto BetterCo Design System tokens (betterco-tokens.css).
    Every rule below keeps referencing these names, so the whole UI adopts the
    design system without touching markup. shadcn roles are HSL triples → hsl();
    widget/primitive tokens are full values → var(). */
 :root{
   --ink:var(--text);                --muted:var(--text-muted);
   --line:var(--card-border);        --bg:var(--color-page);
   --req:var(--danger);              --req-bg:var(--danger-bg);
   --opt:var(--success);             --opt-bg:var(--success-bg);
   --accent:var(--color-brand-blue-accent);   --accent-light:var(--color-brand-blue-01);
   --chip:var(--color-brand-blue-03);          --chip-ink:var(--color-brand-blue-accent);
   --part-bg:var(--color-brand-blue-03);       --part-ink:var(--text);
 }
 *{box-sizing:border-box}
 body{font-family:var(--font-body);color:var(--ink);
   margin:0;background:var(--bg);line-height:var(--lh-normal)}
 header{background:linear-gradient(120deg,var(--color-brand-darkblue-02) 0%,var(--color-brand-navy) 45%,var(--color-brand-blue-accent) 100%);color:#fff;padding:16px 28px;display:flex;align-items:center;gap:14px}
 header img.logo{width:32px;height:32px;border-radius:7px;background:#fff;padding:2px}
 header h1{margin:0;font-size:19px;flex:1}
 .mode{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px}
 .mode.dry{background:#1e293b;color:#7dd3fc}
 .mode.live{background:#7f1d1d;color:#fecaca}
 .lang{display:flex;border:1px solid #334155;border-radius:8px;overflow:hidden}
 .lang button{background:transparent;color:#94a3b8;border:none;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer}
 .lang button.on{background:#4A75DD;color:#fff}
 .wrap{max-width:980px;margin:0 auto;padding:20px 18px 70px}
 .tabs{display:flex;gap:6px;margin:18px 0 6px}
 .tabs .tab{background:var(--chip);color:var(--accent);padding:9px 18px}
 .tabs .tab.on{background:var(--accent);color:#fff}
 .combo{position:relative}
 .combo-list{position:fixed;max-height:320px;overflow:auto;
   background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);z-index:1000}
 .combo-item{padding:9px 12px;font-size:13.5px;cursor:pointer;border-bottom:1px solid #f1f3f5}
 .combo-item:last-child{border-bottom:none}
 .combo-item:hover,.combo-item.active{background:var(--chip)}
 .combo-empty{padding:10px 12px;color:var(--muted);font-size:13px}
 .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);margin-bottom:16px;overflow:hidden}
 .card h3{margin:0;padding:12px 16px;font-size:12px;text-transform:uppercase;letter-spacing:.04em;
   color:var(--muted);border-bottom:1px solid var(--line);background:#fafbfc;display:flex;gap:8px;align-items:center}
 .card h3 .step{background:var(--accent);color:#fff;width:20px;height:20px;border-radius:50%;
   display:inline-flex;align-items:center;justify-content:center;font-size:11px}
 .body{padding:16px}
 .row{display:flex;gap:10px;flex-wrap:wrap;align-items:end}
 label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);display:block;margin-bottom:5px}
 select,input{padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius-md);font-size:var(--fs-base);background:var(--surface)}
 input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px hsl(var(--primary) / .22)}
 .grow{flex:1;min-width:220px}
 button{font-size:var(--fs-base);font-weight:600;border:none;border-radius:var(--radius-md);padding:10px 18px;cursor:pointer;background:var(--accent);color:#fff}
 button:hover{filter:brightness(1.05)} button:disabled{opacity:.45;cursor:not-allowed}
 button.ghost{background:var(--chip);color:var(--accent)}
 button.danger{background:var(--req)}
 .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:700}
 .badge.req{color:var(--req);background:var(--req-bg);border:1px solid var(--danger-border)}
 .badge.opt{color:var(--opt);background:var(--opt-bg);border:1px solid var(--success-border)}
 .res{border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-top:9px;cursor:pointer;display:flex;gap:12px;align-items:flex-start}
 .res:hover{border-color:var(--accent);background:#f8fbff}
 .res.sel{border-color:var(--accent);background:#eff6ff}
 .res .nm{flex:1}.res .nm b{font-size:14px}.res .nm small{color:var(--muted);display:block}
 .res .st{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
 .st.active{background:var(--opt-bg);color:var(--opt)} .st.other{background:#f1f5f9;color:var(--muted)}
 .fcard{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--line);
   border-radius:9px;margin-top:8px;cursor:pointer}
 .fcard:hover{border-color:var(--accent);background:#f8fbff}.fcard.sel{border-color:var(--accent);background:#eff6ff}
 .fcard .fl{flex:1}.fcard .fl b{font-size:13.5px}.fcard .fl small{color:var(--muted);font-variant:small-caps;display:block}
 .et{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--chip);color:var(--chip-ink)}
 .et.part{background:var(--part-bg);color:var(--part-ink)}
 .ct{font-family:ui-monospace,Menlo,monospace;font-size:12px;background:#f1f5f9;padding:3px 8px;border-radius:6px}
 pre{margin:0;background:#0f172a;color:#e2e8f0;padding:14px;border-radius:8px;font-size:12.5px;overflow:auto;white-space:pre-wrap}
 .pkey{color:#7dd3fc}.pstr{color:#bef264}.pnull{color:#fca5a5}
 .hint{font-size:12px;color:var(--muted);margin-top:8px}
 .err{background:var(--req-bg);color:var(--req);border:1px solid #fecaca;border-radius:8px;padding:10px 12px;font-size:13px;margin-top:10px}
 .ok{background:var(--opt-bg);color:var(--opt);border:1px solid #bbf7d0;border-radius:8px;padding:10px 12px;font-size:13px;margin-top:10px}
 .muted{color:var(--muted)} .hidden{display:none}
 .dlrow{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid #f1f3f5;font-size:13px}
 .dlrow .code{font-family:ui-monospace,Menlo,monospace;font-size:11px;background:#f1f5f9;padding:2px 7px;border-radius:5px}
 .spin{display:inline-block;width:13px;height:13px;border:2px solid #cbd5e1;border-top-color:var(--accent);
   border-radius:50%;animation:s .7s linear infinite;vertical-align:-2px}
 @keyframes s{to{transform:rotate(360deg)}}
</style>

// ── searchable jurisdiction combobox ────────────────────────────────────────
let JURS=[];       // priced jurisdictions, sorted (curated first)
let jurCode='';    // selected ISO code ('' = none)

function jurLabel(x){
 const tag = REF.mappings[x.code] ? ' ★' : '';     // ★ = curated legal-form mapping
 const sa = x.auto ? 'A' : 'M';                     // A = automatic search · M = manual
 const band = x.priceBand ? (' · '+x.priceBand) : '';
 return x.name+' ('+x.code+')'+tag+' · '+sa+band;
}

function buildJurOptions(){
 const curated=new Set(Object.keys(REF.mappings));
 JURS=[...REF.jurisdictions].filter(x=>x.priceBand).sort((a,b)=>{
   const ca=curated.has(a.code), cb=curated.has(b.code);
   if(ca!==cb) return cb?1:-1;
   return a.name.localeCompare(b.name);
 });
 const inp=document.getElementById('jurSearch');
 inp.placeholder=t('selJur');
 if(jurCode){ const x=JURS.find(j=>j.code===jurCode); if(x) inp.value=jurLabel(x); }
 renderJurList('');
}

function renderJurList(q){
 q=(q||'').toLowerCase().trim();
 const items = JURS.filter(x=>!q || x.name.toLowerCase().includes(q) || x.code.toLowerCase().includes(q));
 const list=document.getElementById('jurList');
 list.innerHTML = items.length
   ? items.map(x=>'<div class="combo-item" data-code="'+x.code+'">'+esc(jurLabel(x))+'</div>').join('')
   : '<div class="combo-empty">—</div>';
 list.querySelectorAll('.combo-item').forEach(el=>el.onmousedown=(e)=>{
   e.preventDefault();                              // fire before input blur
   jurCode=el.dataset.code;
   const x=JURS.find(j=>j.code===jurCode);
   document.getElementById('jurSearch').value=jurLabel(x);
   document.getElementById('jurList').classList.add('hidden');
   resetFlow(); updateSearchUI();
 });
}
function getJur(){ return jurCode; }

// clear results, selection and all downstream steps (called when the jurisdiction changes)
function resetFlow(){
 sel=null; selForm=null; genCT=null; lastCase=null;
 document.getElementById('searchMsg').innerHTML='';
 document.getElementById('results').innerHTML='';
 hide('formCard'); hide('createCard'); hide('caseCard');
}

function updateSearchUI(){
 const jv = getJur();
 if(!jv){
   document.getElementById('searchBtn').textContent = t('btnSearch');
   document.getElementById('searchHint').innerHTML = t('hintChoose');
   return;
 }
 const auto = jinfo(jv).auto;
 document.getElementById('searchBtn').textContent = auto ? t('btnSearch') : t('btnContinue');
 document.getElementById('searchHint').innerHTML = auto ? t('hintAuto') : t('hintManual');
}

function jinfo(code){
 const ju=REF.jurisdictions.find(x=>x.code===code)||{};
 return {auto:!!ju.auto, name:ju.name||code, forms:REF.mappings[code]||null,
         band:ju.priceBand||null, price:(ju.priceUsd!=null?ju.priceUsd:null)};
}
function priceStr(info){ return info.band || ''; }

// jurisdiction combobox interactions
(function(){
 const inp=document.getElementById('jurSearch'), list=document.getElementById('jurList');
 function pos(){ const r=inp.getBoundingClientRect();
   list.style.left=r.left+'px'; list.style.top=(r.bottom+4)+'px'; list.style.width=r.width+'px'; }
 function open(){ pos(); list.classList.remove('hidden'); }
 const close=()=>list.classList.add('hidden');
 inp.addEventListener('focus',()=>{ renderJurList(''); open(); inp.select(); });
 inp.addEventListener('input',()=>{ jurCode=''; renderJurList(inp.value); open(); resetFlow(); updateSearchUI(); });
 inp.addEventListener('keydown',e=>{ if(e.key==='Escape') close(); });
 inp.addEventListener('blur',()=>{ setTimeout(close,150); });
 window.addEventListener('scroll',()=>{ if(!list.classList.contains('hidden')) pos(); }, true);
 window.addEventListener('resize',()=>{ if(!list.classList.contains('hidden')) pos(); });
})();

async function doSearch(){
 const jur=getJur(), query=document.getElementById('q').value.trim();
 const msg=document.getElementById('searchMsg'), box=document.getElementById('results');
 if(!jur){msg.innerHTML='<div class="err">'+t('chooseJur')+'</div>';return;}
 if(!query){msg.innerHTML='<div class="err">'+t('enterName')+'</div>';return;}
 sel=null; selForm=null; genCT=null; hide('formCard'); hide('createCard'); hide('caseCard');
 // manual jurisdictions have no registry search (upstream 500s) — go straight to manual entry
 if(!jinfo(jur).auto){ return manualEntry(jur, query); }
 msg.innerHTML='<div class="hint"><span class="spin"></span> '+t('searching')+'</div>'; box.innerHTML='';
 const {ok,d}=await api('/api/search?jurisdiction='+encodeURIComponent(jur)+'&query='+encodeURIComponent(query));
 if(!ok){msg.innerHTML='<div class="err">'+esc(d.error)+'</div>';return;}
 const rs=d.results||[];
 msg.innerHTML='<div class="hint">'+t('results',rs.length,query,jur)+'</div>';
 const city=(document.getElementById('city').value||'').trim().toLowerCase();
 box.innerHTML = rs.map((r,i)=>{
   const act=(r.companyStatus||'').toLowerCase()==='active';
   let cinHtml='';
   if(r.cin){
     const c=r.cin, roc=(c.rocCity||'').toLowerCase(), st=(c.state||'').toLowerCase();
     let badge='';
     if(city){
       const rocMain=roc.split(' /')[0];
       const m = (roc && roc.indexOf(city)>=0) || (st && st.indexOf(city)>=0) || (rocMain && city.indexOf(rocMain)>=0);
       badge = m
         ? '<span class="badge opt" style="margin-left:6px">✓ '+t('cinMatch')+'</span>'
         : '<span class="badge" style="margin-left:6px;color:var(--warn-text);background:var(--warn-bg);border:1px solid var(--warn-border)">⚠ '+t('cinCheck')+'</span>';
     }
     cinHtml='<div style="margin-top:5px"><span class="badge" style="background:var(--chip);color:var(--ink)">'+esc(c.label)+'</span>'+badge+'</div>';
   }
   return '<div class="res" data-i="'+i+'">'
    +'<div class="nm"><b>'+esc(r.rawname||r.name||'?')+'</b>'
    +'<small>'+esc(r.externalCode||'')+'</small>'
    +'<small>'+esc(r.rawAddress||[r.street,r.zip,r.city].filter(Boolean).join(', '))+'</small>'
    +cinHtml+'</div>'
    +'<span class="st '+(act?'active':'other')+'">'+esc(r.companyStatus||'—')+'</span></div>';
 }).join('');
 box.querySelectorAll('.res').forEach(el=>el.onclick=()=>{
   box.querySelectorAll('.res').forEach(x=>x.classList.remove('sel'));
   el.classList.add('sel');
   sel={...rs[+el.dataset.i], jurisdiction:jur}; selForm=null; genCT=null;
   renderForm();
 });
}

function resolved(){
 const info=jinfo(sel.jurisdiction);
 if(info.forms && selForm!=null){const f=info.forms[selForm];return {et:f.et,ct:f.ct};}
 if(!info.forms && genCT){return {et:'Company',ct:genCT};}
 return {et:null,ct:null};
}

  +'  '+k('jurisdiction')+': '+v(sel.jurisdiction)+',\n'

function renderJurInfoList(q){
 q=(q||'').toLowerCase().trim();
 const items=MATRIX.jurisdictions.filter(x=>!q || x.name.toLowerCase().includes(q) || (x.group||'').toLowerCase().includes(q));
 const list=document.getElementById('jurInfoList');
 if(!items.length){ list.innerHTML='<div class="hint">'+t('noJur')+'</div>'; return; }
 list.innerHTML=items.map(x=>{
   const idx=MATRIX.jurisdictions.indexOf(x);
   const nm=x.documentsMandatory.length, nn=x.documentsNonMandatory.length;
   return '<div class="res" data-i="'+idx+'"><div class="nm"><b>'+esc(x.name)+'</b>'
     +'<small>'+esc(x.group)+' · '+t('slaWord')+': '+esc(x.sla||'—')+'</small></div>'
     +'<span class="et" style="background:var(--opt-bg);color:var(--opt)">'+nm+' '+t('mandatoryWord')+'</span>'
     +(nn?'<span class="et" style="background:#fffbeb;color:#92400e">'+nn+' '+t('nonMandatoryWord')+'</span>':'')
     +'</div>';
 }).join('');
 list.querySelectorAll('.res').forEach(el=>el.onclick=()=>{
   list.querySelectorAll('.res').forEach(x=>x.classList.remove('sel')); el.classList.add('sel');
   renderJurDetail(MATRIX.jurisdictions[+el.dataset.i]);
 });
}

function chips(arr,na){
 if(!arr||!arr.length) return '<div class="hint" style="margin-top:2px">'+(na||'—')+'</div>';
 return '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">'
   +arr.map(x=>'<span class="et" style="background:var(--chip);color:var(--ink)">'+esc(x)+'</span>').join('')+'</div>';
}
function docBadges(arr,style){
 if(!arr||!arr.length) return '<div class="hint" style="margin-top:2px">—</div>';
 return '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">'
   +arr.map(d=>'<span class="badge" style="'+style+'">'+esc(d)+'</span>').join('')+'</div>';
}
function renderJurDetail(x){
 show('infoCard');
 document.getElementById('infoCardTitle').textContent=x.name;
 document.getElementById('infoDetail').innerHTML=
   '<div class="row" style="align-items:center;margin-bottom:2px">'
   +'<span class="badge" style="background:var(--chip);color:var(--ink)">'+esc(x.group)+'</span>'
   +'<span class="badge opt">'+t('slaWord')+': '+esc(x.sla||'—')+'</span>'
   +(x.registryAccess?'<span class="badge" style="background:var(--chip);color:var(--ink)">'+esc(x.registryAccess)+'</span>':'')
   +'</div>'
   +'<label style="margin-top:12px">'+t('colIdentity')+'</label>'+chips(x.companyIdentity)
   +'<label style="margin-top:12px">'+t('colControl')+'</label>'+chips(x.controlling)
   +'<label style="margin-top:12px">'+t('colShare')+'</label>'+chips(x.shareholders,t('shareNa'))
   +'<label style="margin-top:14px">'+t('colDocs')+' — '+t('mandatoryWord')+'</label>'
   +docBadges(x.documentsMandatory,'color:var(--opt);background:var(--opt-bg);border:1px solid #bbf7d0')
   +'<label style="margin-top:12px">'+t('colDocs')+' — '+t('nonMandatoryWord')+'</label>'
   +docBadges(x.documentsNonMandatory,'color:#92400e;background:#fffbeb;border:1px solid #fde68a')
   +'<div class="hint" style="margin-top:14px">'+t('docNote')+'</div>';
}

let docQTimer=null;
document.getElementById('docQ').addEventListener('input',e=>{
 clearTimeout(docQTimer); docQTimer=setTimeout(()=>loadCases(e.target.value),200);});

async function loadCases(q){
 const box=document.getElementById('caseList');
 box.innerHTML='<div class="hint"><span class="spin"></span> '+t('loadingCases')+'</div>';
 const {ok,d}=await api('/api/cases?q='+encodeURIComponent(q||''));
 if(!ok){box.innerHTML='<div class="err">'+esc(d.error)+'</div>';return;}
 const cs=d.cases||[];
 if(!cs.length){box.innerHTML='<div class="hint">'+t('noCases')+'</div>';return;}
 box.innerHTML=cs.map(c=>
   '<div class="res" data-id="'+esc(String(c.caseCommonId))+'">'
   +'<div class="nm"><b>'+esc(c.name)+'</b>'
   +'<small>Case '+esc(String(c.caseCommonId))+(c.docCount?(' · '+c.docCount+' '+t('docsWord')):'')+'</small></div></div>').join('');
 box.querySelectorAll('.res').forEach(el=>el.onclick=()=>{
   box.querySelectorAll('.res').forEach(x=>x.classList.remove('sel')); el.classList.add('sel');
   selectCase(el.dataset.id);});
}

async function selectCase(id){
 show('docsCard');
 const body=document.getElementById('docsList');
 body.innerHTML='<div class="hint"><span class="spin"></span> '+t('loadingDocs')+'</div>';
 const {ok,d}=await api('/api/case-docs?id='+encodeURIComponent(id));
 if(!ok){body.innerHTML='<div class="err">'+esc(d.error)+'</div>';return;}
 document.getElementById('docsCardTitle').textContent=t('docsFor')+(d.name||('Case '+id));
 const docs=d.documents||[];
 if(!docs.length){body.innerHTML='<div class="hint">'+t('noDocs')+'</div>';return;}
 body.innerHTML=docs.map(doc=>
   '<div class="dlrow"><span class="code">'+esc(doc.type||'?')+'</span>'
   +'<b style="flex:1">'+esc(doc.name)+'</b>'
   +'<span class="muted">'+esc(doc.category||'')+'</span>'
   +(doc.docId?('<button class="ghost" data-c="'+esc(id)+'" data-d="'+esc(doc.docId)+'">'+t('docDownload')+'</button>'):'')
   +'</div>').join('');
 body.querySelectorAll('button[data-d]').forEach(b=>b.onclick=()=>{
   const a=document.createElement('a');
   a.href='/api/case-doc?id='+encodeURIComponent(b.dataset.c)+'&doc='+encodeURIComponent(b.dataset.d);
   document.body.appendChild(a); a.click(); a.remove();});
}

function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}

// ── Setup / workspace connection ────────────────────────────────────────────
function val(id){const e=document.getElementById(id);return e?e.value.trim():'';}

function showMain(){ hide('viewSetup'); show('tabs'); show('viewCreate'); hide('viewDocs'); hide('viewInfo'); }

function openSetup(cfg){
 cfg=cfg||{};
 hide('tabs'); hide('viewCreate'); hide('viewDocs'); hide('viewInfo');
 const keep = flag => cfg[flag] ? t('secretKeep') : '';
 document.getElementById('viewSetup').innerHTML =
   '<h3>'+esc(t('setupTitle'))+'</h3><div class="body">'
   +'<div class="hint" style="margin-top:0">'+esc(t('setupIntro'))+'</div>'
   +'<label style="margin-top:10px">'+esc(t('lblBaseUrl'))+'</label>'
   +'<input id="setBaseUrl" style="width:100%" value="'+esc(cfg.baseUrl||'')+'">'
   +'<label style="margin-top:8px">'+esc(t('lblWorkspace'))+'</label>'
   +'<input id="setWorkspace" style="width:100%" value="'+esc(cfg.workspaceId||'')+'">'
   +'<label style="margin-top:8px">'+esc(t('lblKey'))+'</label>'
   +'<input id="setKey" style="width:100%" autocomplete="off" placeholder="'+esc(keep('hasKey'))+'">'
   +'<label style="margin-top:8px">'+esc(t('lblSecret'))+'</label>'
   +'<input id="setSecret" type="password" style="width:100%" autocomplete="off" placeholder="'+esc(keep('hasSecret'))+'">'
   +'<div class="row" style="margin-top:12px"><button id="setBtn" class="danger">'+esc(t('btnConnect'))+'</button>'
   +'<span class="hint" id="setupMsg" style="margin:0"></span></div></div>';
 show('viewSetup');
 document.getElementById('setBtn').onclick=saveSetup;
}

async function saveSetup(){
 const m=document.getElementById('setupMsg');
 m.innerHTML='<span class="spin"></span> '+esc(t('connecting'));
 const body={baseUrl:val('setBaseUrl'), workspaceId:val('setWorkspace'),
   apiKey:val('setKey'), apiSecret:val('setSecret')};
 const {ok,d}=await api('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:j(body)});
 if(ok && d && d.ok){ REF=null; showMain(); boot(); }
 else { m.innerHTML='<span style="color:var(--req)">'+esc((d&&d.error)||'Failed')+'</span>'; }
}

document.getElementById('settingsBtn').onclick=async()=>{
 const {d}=await api('/api/config'); openSetup(d||{});
};

applyStatic();
(async function start(){
 const {ok,d}=await api('/api/config');
 if(ok && d && d.configured){ showMain(); boot(); }
 else { openSetup(d||{}); }
})();
</script>
</body>
